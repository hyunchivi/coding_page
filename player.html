<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>선수 명단</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        .character {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
        }
        .character img {
            border-radius: 50%;
            margin-right: 20px;
            width: 150px;
            height: 150px;
            object-fit: cover;
        }
        .character .info {
            max-width: 600px;
        }
        .character .info h2 {
            margin: 0 0 10px 0;
        }
        .character .info p {
            margin: 0;
        }
    </style>
</head>
<body>
    <h1>선수 명단</h1>

    <div class="character">
        <img src="beakho.jpeg" alt="강백호">
        <div class="info">
            <h2>강백호</h2>
            <p>1학년 파워포워드</p>
        </div>
    </div>

    <div class="character">
        <img src="taewoong.jpeg" alt="인물 2 사진">
        <div class="info">
            <h2>서태웅</h2>
            <p>1학년 스몰포워드</p>
        </div>
    </div>

    <div class="character">
        <img src="chisu.jpeg" alt="인물 2 사진">
        <div class="info">
            <h2>채치수</h2>
            <p>북산고 농구부 주장 및 3학년 센터</p>
        </div>
    </div>

    <div class="character">
        <img src="taesup.jpeg" alt="인물 2 사진">
        <div class="info">
            <h2>송태섭</h2>
            <p>2학년 포인트가드</p>
        </div>
    </div>

    <div class="character">
        <img src="daeman.png" alt="인물 2 사진">
        <div class="info">
            <h2>정대만</h2>
            <p>3학년 슈팅가드</p>
        </div>
    </div>

    <!-- 추가적인 인물 소개를 여기에 작성할 수 있습니다 -->
</body>
</html>
